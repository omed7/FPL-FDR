<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/FPL-FDR/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="Fantasy Premier League fixture difficulty rating grid with attack/defence modes, team pinning, My Team integration, transfer planner, and more." />
    <title>FPL Fixture Difficulty</title>
    <script>
      // Apply persisted theme before React mounts to avoid a flash of wrong theme.
      try {
        var t = JSON.parse(localStorage.getItem('theme') || '"dark"');
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch { document.documentElement.classList.add('dark'); }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
